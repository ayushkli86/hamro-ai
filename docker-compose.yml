version: '3.8'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - hamroai

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - hamroai

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hamroai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FRONTEND_URL=http://localhost:5000
    depends_on:
      - mongodb
      - redis
    networks:
      - hamroai

volumes:
  mongo_data:

networks:
  hamroai:
